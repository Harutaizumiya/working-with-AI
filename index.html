<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Working with AI</title>
    <style>
      body { background: #0a0a0f; color: #e8e6e3; }
      /* FOUC guard: keep app invisible until JS inits, suppress all transitions */
      #app:not(.ready) { opacity: 0; }
      #app:not(.ready) .slide,
      #app:not(.ready) [data-f] { transition: none !important; }
    </style>
  </head>
  <body>
    <div id="app" style="opacity:0"></div>

    <!-- iframe overlay for external links -->
    <div id="iframe-overlay" class="iframe-overlay" style="display:none">
      <div class="iframe-overlay-bg"></div>
      <div class="iframe-overlay-content">
        <div class="device-chrome"></div>
        <button class="iframe-close interactive" id="iframe-close">×</button>
        <iframe id="overlay-iframe" class="overlay-iframe" title="Preview"></iframe>
      </div>
    </div>

    <div id="progress"><div id="progress-bar"></div></div>
    <div id="slide-counter"></div>
    <div class="nav-hint">← → 翻页 &nbsp;|&nbsp; ↑ ↓ 步进 &nbsp;|&nbsp; ESC 总览</div>

    <!-- Mobile navigation bar -->
    <div id="mobile-nav" class="mobile-nav">
      <button class="mobile-nav-btn" id="mnav-prev" aria-label="上一页">◀</button>
      <button class="mobile-nav-btn" id="mnav-up" aria-label="上一步">▲</button>
      <button class="mobile-nav-btn mobile-nav-overview" id="mnav-overview" aria-label="总览">▦</button>
      <button class="mobile-nav-btn" id="mnav-down" aria-label="下一步">▼</button>
      <button class="mobile-nav-btn" id="mnav-next" aria-label="下一页">▶</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
